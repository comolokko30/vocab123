<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcards Pro</title>
<style>
body {font-family: Arial; background:#f4f4f4; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;}
.card {width:450px;height:260px;background:white;border-radius:15px;display:flex;justify-content:center;align-items:center;font-size:22px;text-align:center;padding:20px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.2);} 
.controls {margin-top:20px;display:flex;gap:10px;}
button {padding:10px 15px;border:none;border-radius:10px;background:#333;color:white;cursor:pointer;}
</style>
</head>
<body>

<div class="card" id="card">Loading...</div>

<div class="controls">
  <button onclick="prevCard()">Previous</button>
  <button onclick="flipCard()">Flip</button>
  <button onclick="nextCard()">Next</button>
  <button onclick="toggleLang()">TR/EN</button>
</div>

<script>
let words = [];
let index = 0;
let flipped = false;
let showTR = false;
const card = document.getElementById("card");

// JSON'dan yükleme
fetch('words.json')
  .then(res => res.json())
  .then(data => {
    words = data;
    render();
  });

function render(){
  if(words.length === 0) return;
  if(!flipped){
    card.textContent = words[index].w;
  } else {
    card.textContent = showTR ? words[index].tr : words[index].en;
  }
}

function flipCard(){ flipped = !flipped; render(); }
function toggleLang(){ showTR = !showTR; if(flipped) render(); }
function nextCard(){ index = (index + 1) % words.length; flipped = false; render(); }
function prevCard(){ index = (index - 1 + words.length) % words.length; flipped = false; render(); }
// Keyboard controls
window.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowRight') {
    nextCard();
  } else if (e.code === 'ArrowLeft') {
    prevCard();
  } else if (e.code === 'Space') {
    e.preventDefault();
    flipCard();
  }
});

</script>

</body>
</html>
